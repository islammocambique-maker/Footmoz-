<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam M - Assistente Islâmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8a6e;
            --primary-dark: #0d3d2e;
            --gold: #c9a227;
            --bg: #f0f4f1;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #d4ddd8;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-radius: 16px;
            margin-bottom: 10px;
            color: white;
        }

        .header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
        .header p { opacity: 0.9; font-size: 0.85rem; }

        .chat-container {
            flex: 1;
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 65vh;
        }

        .message {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: #f5f7f6;
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.bot .greeting {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 6px;

        .quran-result {

            text-align: right;

        .quran-translation {
            font-size: 0.9rem;

        .typing span {

        @keyframes bounce {

        @media (max-width: 600px) {

            .message { max-width: 92%; padding: 10px 14px; font-size: 0.9rem; }
            .messages { padding: 10px; max-height: 60vh; }
            .quick-actions { gap: 6px; padding: 8px 10px; }

            background: var(--primary);

            line-height: 1;
            cursor: pointer;

            opacity: 0.15;

        }
        #fabUp {
            top: 10px;
        }

            bottom: 10px;
        }

    </style>

<body>

<div class="container">
    <div class="header">
        <h1>☪ Islam M</h1>

    </div>

    <div class="chat-container">

            </div>

        </div>

</div>

<script>
// ==================== UTILITÁRIOS ====================
function removerAcentos(str) {
    return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// ==================== CONFIGURAÇÃO ====================
const CONFIG = {
    CEREBRO_FICHEIROS: [
        { pasta: 'cerebro/definicao/', ficheiro: 'Janazah' },
        { pasta: 'cerebro/definicao/', ficheiro: 'adoracao_ibadah' },
        { pasta: 'cerebro/definicao/', ficheiro: 'comportamento' },
        { pasta: 'cerebro/definicao/', ficheiro: 'crenca_aquidah' },
        { pasta: 'cerebro/definicao/', ficheiro: 'crianca_educacao_bobecas' },
        { pasta: 'cerebro/definicao/', ficheiro: 'familia_direitos' },
        { pasta: 'cerebro/definicao/', ficheiro: 'fiqh' },
        { pasta: 'cerebro/definicao/', ficheiro: 'historia_islamica' },
        { pasta: 'cerebro/definicao/', ficheiro: 'mulheres_do_profeta' },
        { pasta: 'cerebro/definicao/', ficheiro: 'palavras' },
        { pasta: 'cerebro/definicao/', ficheiro: 'perguntas_frequentes' },
        { pasta: 'cerebro/definicao/', ficheiro: 'ramadan' },
        { pasta: 'cerebro/extra/', ficheiro: 'extra_bot' },
        { pasta: 'cerebro/mais/', ficheiro: 'mais_conhecimento' },
        { pasta: 'cerebro/pratica/', ficheiro: 'salat' },
        { pasta: 'cerebro/pratica/', ficheiro: 'Wudhu' }
    ],
    WHATSAPP: "258860407269",
    EMAIL: "Islammocambique@gmail.com",
    FACEBOOK: "https://www.facebook.com/islamguia"
};

// ==================== ESTADO ====================
let cerebro = [];
let historicoRespostas = [];
let respostaAtual = null;

// ==================== INICIALIZAÇÃO ====================
document.addEventListener('DOMContentLoaded', () => {
    carregarCerebro();
    
    adicionarMensagemBotHTML(`
        <span class="greeting">Assalamu Alaikum! ☪️</span>
        <div style="margin-top: 6px; line-height: 1.7;">
            Sou o <strong>Islam M</strong>, seu assistente de conhecimento islâmico.<br><br>
            <strong>Como perguntar:</strong><br>
            • Digite uma ou mais palavras-chave do tema<br>
            • Ex: <em>crianças educação</em> ou <em>imagens proibição</em> ou <em>respeito pais</em><br>
            • Ou versículos: <em>2:155</em><br><br>
            O bot encontra a resposta que tem <strong>mais palavras em comum</strong> com a sua pergunta.
        </div>
    `);
    
    setupEventos();
});

function setupEventos() {
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const map = {
                wudu: "wudhu",
                salat: "salat",
                quran: "2:155",
                support: "suporte"
            };
            input.value = map[btn.dataset.action] || "";
            sendMessage();
        });
    });
}

// ==================== CARREGAR CÉREBRO ====================
async function carregarCerebro() {
    cerebro = [];
    
    for (const item of CONFIG.CEREBRO_FICHEIROS) {
        try {
            const url = `${item.pasta}${item.ficheiro}`;
            const response = await fetch(url);
            
            if (response.ok) {
                const texto = await response.text();
                const dados = parseCerebroTexto(texto, item.ficheiro);
                
                if (dados && dados.length > 0) {
                    cerebro = [...cerebro, ...dados];
                    console.log(`✅ ${item.ficheiro}: ${dados.length} entradas`);
                } else {
                    console.log(`⚠️ ${item.ficheiro}: 0 entradas válidas`);
                }
            } else {
                console.log(`❌ ${item.ficheiro}: HTTP ${response.status}`);
            }
        } catch (e) {
            console.log(`❌ ${item.ficheiro}: ${e.message}`);
        }
    }
    
    console.log(`🧠 Total: ${cerebro.length} entradas`);
    
    // Debug: mostra as primeiras 3 entradas de cada ficheiro
    cerebro.forEach((entry, i) => {
        if (i < 5 || entry.fonte === 'crianca_educacao_bobecas') {
            console.log(`[${entry.fonte}] keywords: [${entry.palavras_chave?.join(', ')}]`);
        }
    });
}

// ==================== PARSE DO FORMATO DO CÉREBRO ====================
function parseCerebroTexto(texto, nomeFicheiro) {
    const entradas = [];
    
    // Tenta JSON primeiro
    try {
        const json = JSON.parse(texto);
        
        if (Array.isArray(json)) {
            return json.map(entry => normalizarEntrada(entry, nomeFicheiro)).filter(e => e);
        }
        
        if (json.palavras_chave || json.resposta || json.resposta) {
            const parsed = normalizarEntrada(json, nomeFicheiro);
            return parsed ? [parsed] : [];
        }
        
        if (json.data && Array.isArray(json.data)) {
            return json.data.map(entry => normalizarEntrada(entry, nomeFicheiro)).filter(e => e);
        }
    } catch (e) {
        // Não é JSON, parse como texto
    }
    
    // Parse de formato texto/blocos
    const blocos = texto.split(/\n---+\n|\n\n\n+/);
    
    for (const bloco of blocos) {
        if (!bloco.trim()) continue;
        
        const linhas = bloco.trim().split('\n');
        const entry = {
            palavras_chave: [],
            resposta: '',
            fonte: nomeFicheiro,
            categoria: detectarCategoria(nomeFicheiro),
            nivel: 'basico',
            links: []
        };
        
        let modo = 'keywords';
        
        for (const linha of linhas) {
            const trimmed = linha.trim();
            if (!trimmed) continue;
            
            if (trimmed.toLowerCase().startsWith('palavras_chave:') || modo === 'keywords') {
                const textoKw = trimmed.replace(/palavras_chave:\s*/i, '');
                entry.palavras_chave = textoKw.split(/[,;|]/).map(k => k.trim().toLowerCase()).filter(k => k);
                modo = 'resposta';
            }
            else if (trimmed.toLowerCase().startsWith('resposta:')) {
                entry.resposta = trimmed.replace(/resposta:\s*/i, '');
                modo = 'resposta';
            }
            else if (trimmed.toLowerCase().startsWith('fonte:')) {
                entry.fonte = trimmed.replace(/fonte:\s*/i, '');
            }
            else if (modo === 'resposta') {
                entry.resposta += (entry.resposta ? '\n' : '') + trimmed;
            }
        }
        
        if (entry.palavras_chave.length > 0 && entry.resposta) {
            entradas.push(entry);
        }
    }
    
    // Fallback: linha a linha
    if (entradas.length === 0) {
        const linhas = texto.split('\n').filter(l => l.trim());
        for (const linha of linhas) {
            const match = linha.match(/^([^:]+):\s*(.+)$/);
            if (match) {
                entradas.push({
                    palavras_chave: match[1].split(/[,;]/).map(k => k.trim().toLowerCase()).filter(k => k),
                    resposta: match[2].trim(),
                    fonte: nomeFicheiro,
                    categoria: detectarCategoria(nomeFicheiro),
                    nivel: 'basico',
                    links: []
                });
            }
        }
    }
    
    return entradas;
}

function normalizarEntrada(entry, nomeFicheiro) {
    if (!entry) return null;
    
    // Pega palavras-chave
    let keywords = [];
    if (Array.isArray(entry.palavras_chave)) {
        keywords = entry.palavras_chave;
    } else if (typeof entry.palavras_chave === 'string') {
        keywords = entry.palavras_chave.split(/[,;|]/);
    }
    
    // Normaliza: minúsculas, sem acentos, trim, remove vazios
    keywords = keywords
        .map(k => String(k).toLowerCase().trim())
        .map(k => removerAcentos(k))
        .filter(k => k.length > 0);
    
    // Pega resposta (aceita "resposta" ou "resposta")
    let resposta = entry.resposta || entry.resposta || '';
    
    if (keywords.length === 0 || !resposta) {
        return null;
    }
    
    return {
        palavras_chave: keywords,
        resposta: resposta,
        fonte: entry.fonte || nomeFicheiro,
        categoria: entry.categoria || detectarCategoria(nomeFicheiro),
        nivel: entry.nivel || 'basico',
        links: entry.links || []
    };
}

function detectarCategoria(nomeFicheiro) {
    const lower = nomeFicheiro.toLowerCase();
    if (lower.includes('pratica') || lower.includes('salat') || lower.includes('wudhu')) return 'pratica';
    if (lower.includes('definicao') || lower.includes('crenca') || lower.includes('fiqh') || lower.includes('aqidah')) return 'definicao';
    if (lower.includes('extra')) return 'extra';
    return 'mais';
}

// ==================== ENVIO DE MENSAGEM ====================
function sendMessage() {
    const input = document.getElementById('userInput');
    const texto = input.value.trim();
    
    if (!texto) return;
    
    adicionarMensagemUsuario(texto);
    input.value = '';
    
    mostrarDigitando();
    
    setTimeout(() => {
        processarPergunta(texto);
    }, 800);
}

// ==================== PROCESSAMENTO ====================
async function processarPergunta(texto) {
    esconderDigitando();
    
    const lower = texto.toLowerCase().trim();
    
    // Quran primeiro
    const quranMatch = detectarVersiculo(texto);
    if (quranMatch) {
        await buscarVersiculoAPI(quranMatch.surah, quranMatch.ayah);
        return;
    }
    
    // Suporte
    if (lower.includes('suporte') || lower.includes('ajuda') || lower.includes('contacto') || lower.includes('contato')) {
        responderSuporte();
        return;
    }
    
    // Busca no cérebro
    const entry = encontrarMelhorEntrada(texto);
    
    if (entry) {
        // Escolhe a keyword que melhor representa o match
        const keywordDisplay = entry.keywordMatch || entry.palavras_chave[0];
        responderComFormato(entry, keywordDisplay);
    } else {
        responderNaoEncontrado(texto);
    }
}

// ==================== DETECTAR VERSÍCULO ====================
function detectarVersiculo(texto) {
    const padroes = [
        /(\d+)[:\/](\d+)/,
        /surah?\s+(\d+).*?ayah?\s+(\d+)/i,
        /capitulo?\s+(\d+).*?versiculo?\s+(\d+)/i,
        /(\d+)\s+(\d+)/
    ];
    
    for (const padrao of padroes) {
        const match = texto.match(padrao);
        if (match) {
            const surah = parseInt(match[1]);
            const ayah = parseInt(match[2]);
            if (surah >= 1 && surah <= 114 && ayah >= 1) {
                return { surah, ayah };
            }
        }
    }
    
    return null;
}

// ==================== BUSCAR NO CÉREBRO — AVALIA TODAS AS KEYWORDS JUNTAS ====================
function encontrarMelhorEntrada(texto) {
    // Normaliza a pergunta do utilizador
    const palavrasUsuario = texto.toLowerCase()
        .replace(/[^\w\s]/g, ' ') // remove pontuação
        .split(/\s+/)
        .map(p => removerAcentos(p.trim()))
        .filter(p => p.length >= 2); // palavras com 2+ letras
    
    console.log('🔍 Palavras do utilizador:', palavrasUsuario);
    
    if (palavrasUsuario.length === 0) return null;
    
    let melhorEntrada = null;
    let melhorScore = 0;
    let melhorKeywordMatch = '';
    
    for (const entry of cerebro) {
        const keywords = entry.palavras_chave || [];
        if (keywords.length === 0) continue;
        
        let score = 0;
        let keywordsEncontradas = [];
        let matchExato = false;
        
        for (const palavraUser of palavrasUsuario) {
            for (const kw of keywords) {
                const kwNormalizada = removerAcentos(kw);
                
                // Match exato (maior pontuação)
                if (kwNormalizada === palavraUser) {
                    score += 10;
                    keywordsEncontradas.push(kw);
                    if (!matchExato) matchExato = true;
                }
                // Keyword contém a palavra do user (ex: "proibicao" em "proibicao_imagens")
                else if (kwNormalizada.includes(palavraUser) && palavraUser.length >= 3) {
                    score += 5;
                    keywordsEncontradas.push(kw);
                }
                // Palavra do user contém a keyword (ex: "proibicoes" contém "proib")
                else if (palavraUser.includes(kwNormalizada) && kwNormalizada.length >= 3) {
                    score += 3;
                    keywordsEncontradas.push(kw);
                }
            }
        }
        
        // Bônus se encontrou múltiplas keywords da MESMA entrada
        const keywordsUnicas = [...new Set(keywordsEncontradas)];
        if (keywordsUnicas.length > 1) {
            score += keywordsUnicas.length * 2; // +2 por cada keyword extra
        }
        
        // Penalidade se a entrada tem MUITAS keywords mas poucas deram match
        // (evita escolher entradas genéricas)
        const ratioMatch = keywordsUnicas.length / keywords.length;
        if (ratioMatch < 0.3 && keywords.length > 5) {
            score *= 0.5; // penaliza se match < 30% em entradas grandes
        }
        
        console.log(`  📊 ${entry.fonte}: score=${score}, matches=[${keywordsUnicas.join(', ')}]`);
        
        if (score > melhorScore) {
            melhorScore = score;
            melhorEntrada = entry;
            melhorKeywordMatch = keywordsUnicas[0] || entry.palavras_chave[0];
        }
    }
    
    // Só responde se tiver score mínimo (evita matches fracos)
    const SCORE_MINIMO = 3;
    
    console.log('🏆 Melhor:', melhorEntrada?.fonte, 'score:', melhorScore, 'keyword:', melhorKeywordMatch);
    
    if (melhorScore >= SCORE_MINIMO && melhorEntrada) {
        melhorEntrada.keywordMatch = melhorKeywordMatch;
        return melhorEntrada;
    }
    
    return null;
}

// ==================== BUSCAR VERSÍCULO ====================
async function buscarVersiculoAPI(surah, ayah) {
    let arabicText = '';
    let translation = '';
    
    try {
        const response = await fetch(`https://quranenc.com/api/v1/translation/aya/portuguese_nasr/${surah}/${ayah}`);
        if (response.ok) {
            const data = await response.json();
            if (data && data.result) {
                arabicText = data.result.arabic_text || '';
                translation = data.result.translation || '';
            }
        }
    } catch (e) {}
    
    if (!translation) {
        try {
            const response = await fetch(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/editions/quran-uthmani,pt.hamidullah`);
            if (response.ok) {
                const data = await response.json();
                if (data.data && data.data.length >= 2) {
                    arabicText = data.data[0].text || '';
                    translation = data.data[1].text || '';
                }
            }
        } catch (e) {}
    }
    
    if (!translation && !arabicText) {
        adicionarMensagemBotHTML(`
            <span class="greeting">⚠️ Erro de conexão</span>
            <div style="margin-top: 6px;">
                Não foi possível carregar <strong>${surah}:${ayah}</strong>.<<br>
                <a href="https://quran.com/pt/${surah}/${ayah}" target="_blank" style="color: var(--primary);">🔗 quran.com/pt/${surah}/${ayah}</a>
            </div>
        `);
        return;
    }
    
    if (!translation) translation = 'Tradução indisponível.';
    if (!arabicText) arabicText = '〔Árabe não disponível〕';
    
    salvarNoHistorico();
    respostaAtual = { tipo: 'quran', surah, ayah, arabic: arabicText, translation };
    
    const html = `
        <span class="greeting">ótima pergunta! Aqui vai uma resposta sobre <span class="keyword">Alcorão ${surah}:${ayah}</span></span>
        <div class="quran-result">
            <span class="quran-ref">📖 Surah ${surah} : ${ayah}</span>
            <div class="quran-arabic">${arabicText}</div>
            <div class="quran-translation"><strong>Significado em Português:</strong><br>${translation}</div>
        </div>
        ${renderizarHistorico()}
    `;
    
    adicionarMensagemBotHTML(html);
}

// ==================== HISTÓRICO ====================
function salvarNoHistorico() {
    if (respostaAtual) {
        historicoRespostas.unshift({
            ...respostaAtual,
            timestamp: new Date().toLocaleString('pt-MZ')
        });
        if (historicoRespostas.length > 10) historicoRespostas.pop();
    }
}

function renderizarHistorico() {
    if (historicoRespostas.length === 0) return '';
    
    let html = '<div class="previous-answers">';
    html += `<button class="prev-btn" onclick="toggleHistorico(this)">📜 Ver anteriores (${historicoRespostas.length})</button>`;
    html += '<div class="prev-list">';
    
    historicoRespostas.forEach((item) => {
        html += `<div class="prev-item">`;
        if (item.tipo === 'quran') {
            html += `<strong>Alcorão ${item.surah}:${item.ayah}</strong>`;
        } else {
            html += `<strong>${item.keyword || 'tema'}</strong>`;
        }
        html += `<small>${item.timestamp}</small>`;
        html += `</div>`;
    });
    
    html += '</div></div>';
    return html;
}

function toggleHistorico(btn) {
    const list = btn.nextElementSibling;
    list.classList.toggle('show');
    btn.textContent = list.classList.contains('show') 
        ? '🔼 Ocultar' 
        : `📜 Ver anteriores (${historicoRespostas.length})`;
}

// ==================== UI HELPERS ====================
function adicionarMensagemUsuario(texto) {

function adicionarMensagemBotHTML(html) {

function esconderDigitando() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
}

window.toggleHistorico = toggleHistorico;


// ==================== SCROLL FABs ====================
(function() {
    var msgs = document.getElementById('messages');
    var fabUp = document.getElementById('fabUp');
    var fabDown = document.getElementById('fabDown');
    if (!msgs || !fabUp || !fabDown) return;

    var STEP = 250;

    function scrollUp() { msgs.scrollTop -= STEP; }
    function scrollDown() { msgs.scrollTop += STEP; }

    // Use onclick for maximum compatibility (preview iframe, mobile, desktop)
    fabUp.onclick = scrollUp;
    fabDown.onclick = scrollDown;

    // Also bind touchstart for instant response on mobile
    fabUp.ontouchstart = function(e) { e.preventDefault(); scrollUp(); };
    fabDown.ontouchstart = function(e) { e.preventDefault(); scrollDown(); };

    function updateState() {
        var st = msgs.scrollTop;
        var sh = msgs.scrollHeight;
        var ch = msgs.clientHeight;
        fabUp.classList.toggle('hidden', st <= 2);
        fabDown.classList.toggle('hidden', st + ch >= sh - 2);
    }

    msgs.onscroll = updateState;
    new MutationObserver(updateState).observe(msgs, { childList: true });
    setTimeout(updateState, 300);
})();

</script>

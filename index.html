<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrassa Online Islam Moçambique</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d4a2e 0%, #1a6b3a 50%, #0d4a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            color: #c9a84c;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn-aula {
            display: block;
            width: 100%;
            max-width: 300px;
            background: linear-gradient(45deg, #c9a84c, #e8c96a);
            color: #0d4a2e;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.5);
            transition: all 0.3s ease;
        }

        .btn-aula:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(201, 168, 76, 0.7);
        }

        .btn-admin {
            margin-top: 30px;
            background: transparent;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            font-size: 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-admin:hover {
            color: #c9a84c;
            border-color: #c9a84c;
        }

        .admin-panel {
            display: none;
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #c9a84c;
            border-radius: 15px;
            padding: 20px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }

        .admin-panel.show {
            display: block;
        }

        .admin-panel h3 {
            color: #c9a84c;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .admin-panel p {
            color: #ccc;
            font-size: 0.85rem;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .admin-panel .senha {
            background: rgba(201, 168, 76, 0.2);
            border: 1px dashed #c9a84c;
            border-radius: 8px;
            padding: 10px;
            margin: 8px 0;
            font-family: monospace;
            font-size: 0.95rem;
            color: #e8c96a;
        }
    </style>
<base target="_blank">
</head>
<body>

    <div class="logo-icon">🕌</div>
    <h1>Madrassa Online Islam</h1>
    <p class="subtitle">Moçambique</p>

    <a class="btn-aula" href="https://meet.jit.si/IM.VideoAula" target="_blank">
        📹 Vídeo Aulas
    </a>

    <button class="btn-admin" onclick="toggleAdmin()">⚙️ Administrador</button>

    <div class="admin-panel" id="adminPanel">
        <h3>🔐 Acesso Administrativo</h3>
        <p>Sala: <strong>IM.VideoAula</strong></p>
        <p>Utilize uma das seguintes senhas para entrar como moderador:</p>
        <div class="senha">Abdullah123</div>
        <div class="senha">Abdulfatah123</div>
        <p style="margin-top:10px; font-size:0.75rem; color:#888;">Clique em "Vídeo Aulas" para aceder à sala.</p>
    </div>

    <script>
        function toggleAdmin() {
            document.getElementById('adminPanel').classList.toggle('show');
        }
    </script>

</body>
</html>
